<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E음우편 앱 프로토타입</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-bg">
      <section class="app-intro">
        <div class="intro-badge">💗 마음을 잇다 E음우편 앱 프로토타입</div>
        <h1>아날로그 편지 구독 서비스를 모바일 앱으로 구현했습니다</h1>
        <p>
          자녀 세대가 1분 안에 사진과 안부를 작성하고, 우체국 인프라를 통해 실물 편지로
          전달받는 흐름을 HTML, CSS, jQuery 기반으로 옮긴 버전입니다.
        </p>
      </section>

      <main class="phone-shell">
        <div class="phone-screen">
          <header class="phone-header">
            <div class="header-top">
              <div class="brand-mark">
                <img src="logo.png" alt="마음을 잇다 E음우편 로고" />
              </div>
              <button class="menu-button" type="button" aria-label="메뉴">☰</button>
            </div>
            <div class="title-panel">
              <h2 id="screenTitle">마음을 잇다</h2>
              <p id="screenSubtitle">E음우편으로 안부를 실물 편지로 전해보세요.</p>
            </div>
          </header>

          <section class="screen-body">
            <div id="pageRoot"></div>
          </section>

          <nav class="bottom-nav">
            <button type="button" class="nav-item is-active" data-page="home">
              <span class="nav-icon">⌂</span>
              <span class="nav-label">홈</span>
            </button>
            <button type="button" class="nav-item" data-page="write">
              <span class="nav-icon">✎</span>
              <span class="nav-label">편지쓰기</span>
            </button>
            <button type="button" class="nav-item" data-page="subscribe">
              <span class="nav-icon">🗓</span>
              <span class="nav-label">구독</span>
            </button>
            <button type="button" class="nav-item" data-page="history">
              <span class="nav-icon">✉</span>
              <span class="nav-label">내역</span>
            </button>
            <button type="button" class="nav-item" data-page="mypage">
              <span class="nav-icon">☺</span>
              <span class="nav-label">내정보</span>
            </button>
          </nav>
        </div>
      </main>
    </div>

    <script src="jquery.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
